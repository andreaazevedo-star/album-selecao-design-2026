<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seleção do Design 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
body{background:#0f2d1a}

/* ===== LOGIN ===== */
/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:999;overflow:hidden;
  background:radial-gradient(ellipse 120% 80% at 50% 100%, #0a3d1f 0%, #051a0d 60%, #020d06 100%)}
#login-screen::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 40% 30% at 20% 30%, rgba(80,200,100,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 25%, rgba(80,200,100,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 60% 20% at 50% 0%, rgba(120,220,130,0.12) 0%, transparent 60%);
  pointer-events:none}
#login-screen::after{content:'';position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(to top, rgba(10,50,20,0.8) 0%, transparent 100%);
  pointer-events:none}
.login-bokeh{position:absolute;border-radius:50%;filter:blur(18px);opacity:0.55;pointer-events:none}

.login-card{position:relative;z-index:2;text-align:center;width:320px;padding:0}
.login-frame{
  background:linear-gradient(160deg, rgba(20,60,30,0.97) 0%, rgba(10,35,18,0.99) 100%);
  border:2px solid transparent;
  border-radius:12px;
  padding:32px 28px 28px;
  position:relative;
  box-shadow:0 0 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(200,170,60,0.2)}
.login-frame::before{content:'';position:absolute;inset:-2px;border-radius:13px;
  background:linear-gradient(145deg,#c8a83c,#6b5a1e,#c8a83c,#8a7230,#c8a83c);
  z-index:-1}
.login-corner{position:absolute;width:22px;height:22px;border-color:#c8a83c;border-style:solid;opacity:0.9}
.login-corner.tl{top:6px;left:6px;border-width:2px 0 0 2px;border-radius:3px 0 0 0}
.login-corner.tr{top:6px;right:6px;border-width:2px 2px 0 0;border-radius:0 3px 0 0}
.login-corner.bl{bottom:6px;left:6px;border-width:0 0 2px 2px;border-radius:0 0 0 3px}
.login-corner.br{bottom:6px;right:6px;border-width:0 2px 2px 0;border-radius:0 0 3px 0}

.login-shield{width:72px;height:72px;margin:0 auto 10px;position:relative}
.login-shield svg{width:100%;height:100%}

.login-title{font-size:1.55rem;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;line-height:1.1;
  background:linear-gradient(180deg,#fff 40%,#c8a83c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px}
.login-sub{color:#c8a83c;font-size:0.78rem;font-weight:700;letter-spacing:0.18em;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:6px}
.login-sub::before,.login-sub::after{content:'★';font-size:0.65rem}

.login-field{position:relative;margin-bottom:12px}
.login-field-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.45);font-size:0.9rem;pointer-events:none}
#login-select{width:100%;padding:11px 14px 11px 36px;border-radius:8px;
  border:1.5px solid rgba(200,168,60,0.35);
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);
  font-size:0.9rem;outline:none;appearance:none;cursor:pointer;
  transition:border-color .2s}
#login-select:focus{border-color:rgba(200,168,60,0.7)}
#login-select option{background:#0a2e14;color:#fff}

.login-btn{width:100%;padding:12px;
  background:linear-gradient(90deg,#1a8a4a,#00b06f,#1a8a4a);
  background-size:200% 100%;
  color:#fff;border:none;border-radius:8px;font-size:0.95rem;font-weight:800;
  letter-spacing:0.05em;cursor:pointer;transition:.25s;
  box-shadow:0 4px 20px rgba(0,160,80,0.35)}
.login-btn:hover{background-position:right center;box-shadow:0 6px 28px rgba(0,160,80,0.5);transform:translateY(-1px)}

.login-star-bottom{color:#c8a83c;font-size:0.9rem;margin-top:16px;opacity:0.7}

/* ===== SWITCH USER BTN ===== */
#switch-user-btn{position:fixed;top:12px;right:16px;background:rgba(0,0,0,0.3);color:#fff;border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:0.85rem;z-index:40;display:none;transition:.2s}
#switch-user-btn:hover{background:rgba(0,0,0,0.5)}

/* ===== BOOK SCENE ===== */
#book-scene{width:100vw;height:100vh;background:#0f2d1a;background-image:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,0.03) 40px,rgba(255,255,255,0.03) 41px);display:flex;align-items:center;justify-content:center;perspective:3000px;position:relative}

#book{width:1100px;height:720px;position:relative;transform-style:preserve-3d;box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 0 1px rgba(0,0,0,0.1);border-radius:6px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
#book.closed{width:550px;cursor:pointer}
#book::before{content:'';position:absolute;left:calc(50% - 4px);top:0;width:8px;height:100%;background:#065f46;z-index:10;box-shadow:inset -2px 0 4px rgba(0,0,0,0.3),inset 2px 0 4px rgba(255,255,255,0.1);transition:opacity 0.3s}
#book.closed::before{opacity:0}
#book.closed .hint-open{display:flex}
.hint-open{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.35);color:#fff;padding:8px 18px;border-radius:20px;font-size:.8rem;gap:6px;align-items:center;pointer-events:none;white-space:nowrap}

.static-page{position:absolute;width:calc(50% - 4px);height:100%;overflow-y:auto;background:#fafaf8}
#p-left{left:0;border-radius:6px 0 0 6px;box-shadow:inset -8px 0 20px rgba(0,0,0,0.1)}
#p-right{right:0;border-radius:0 6px 6px 0}
#book.closed #p-left{display:none}
#book.closed #p-right{width:100%;border-radius:6px;right:0}

/* Flip */
#flipper{position:absolute;width:calc(50% - 4px);height:100%;transform-style:preserve-3d;transition:transform 0.75s cubic-bezier(0.4,0,0.2,1);z-index:20;pointer-events:none;display:none}
#flipper.flip-forward{left:calc(50% + 4px);transform-origin:left center}
#flipper.flip-backward{right:0;left:auto;transform-origin:right center}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;overflow:hidden;background:#fafaf8}
.flip-face.back{transform:rotateY(180deg)}

/* Nav */
.nav-btn{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.18);backdrop-filter:blur(10px);color:#fff;font-size:1.8rem;border:2px solid rgba(255,255,255,0.2);cursor:pointer;z-index:30;transition:.2s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.nav-btn:hover{background:rgba(255,255,255,0.32);transform:translateY(-50%) scale(1.08)}
.nav-btn:disabled{opacity:.2;cursor:default;pointer-events:none}
#nav-prev{left:24px}
#nav-next{right:24px}

/* Dots */
#dots{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:30}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:.2s}
.dot.active{background:#fff;width:20px;border-radius:5px}

/* ===== COVER PAGE ===== */
.cover-page{width:100%;height:100%;background:linear-gradient(160deg,#064e3b 0%,#065f46 50%,#047857 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:24px;text-align:center;border-radius:0 6px 6px 0}
.cover-shield{width:100px;height:120px;margin-bottom:16px}
.cover-title{font-size:2.2rem;font-weight:800;margin-bottom:4px}
.cover-year{font-size:3.5rem;font-weight:900;color:#00b06f;line-height:1}
.cover-sub{font-size:.9rem;color:rgba(255,255,255,.7);margin-bottom:16px}
.cover-divider{width:40%;height:1px;background:rgba(255,255,255,.3);margin:12px auto}
.cover-progress-label{font-size:.8rem;color:rgba(255,255,255,.7);margin-bottom:6px}
.cover-progress-bar{width:80%;height:8px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin:0 auto 12px}
.cover-progress-fill{height:100%;background:#00b06f;border-radius:4px;transition:width .4s}
.cover-packs{font-size:.85rem;color:rgba(255,255,255,.6)}

/* ===== SQUAD PAGE ===== */
.squad-page{width:100%;min-height:100%;padding:0 0 16px 0}
.squad-header{display:flex;align-items:center;gap:12px;padding:14px 16px;color:#fff;position:sticky;top:0;z-index:5}
.squad-emoji{font-size:2rem;flex-shrink:0}
.squad-header h2{font-size:1.1rem;font-weight:800;line-height:1.2}
.squad-header p{font-size:.75rem;opacity:.85;margin-top:2px}
.squad-count{margin-left:auto;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 10px;font-size:.8rem;font-weight:700;white-space:nowrap}
.squad-note{font-size:.78rem;color:#6b7280;font-style:italic;padding:6px 16px 4px;background:#f0f0ec;border-left:3px solid #d1fae5;margin-bottom:4px}
.squad-page section{padding:8px 12px 4px}
.squad-page section h3{font-size:.78rem;font-weight:700;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.cards-grid{display:flex;flex-wrap:wrap;gap:8px}
.cards-grid-tecnico{display:flex;flex-wrap:wrap;gap:10px}

/* ===== CARD ===== */
.card{width:80px;height:115px;border-radius:8px;overflow:hidden;position:relative;box-shadow:0 2px 8px rgba(0,0,0,0.15);background:#fff;flex-shrink:0;cursor:pointer;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.card-tecnico-lg{width:88px;height:126px}
.card-strip{height:24px;display:flex;align-items:center;justify-content:flex-end;padding:0 6px}
.card-num{color:rgba(255,255,255,.8);font-size:.55rem;font-weight:700}
.card-avatar{width:52px;height:52px;border-radius:50%;margin:6px auto 4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem;font-weight:700}
.card-tecnico-lg .card-avatar{width:58px;height:58px;font-size:1.1rem}
.card-info{text-align:center;padding:0 4px}
.card-name{font-size:.57rem;font-weight:700;line-height:1.2;color:#1a1a1a;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.card-role{font-size:.48rem;color:#6b7280;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-squad-tag{font-size:.46rem;font-weight:600;margin-top:2px}
.card.not-collected{filter:grayscale(1);opacity:.38}
.card.is-special{border:2.5px solid #d97706}
.card.is-special::after{content:'⭐';position:absolute;top:2px;right:2px;font-size:.55rem;background:rgba(255,255,255,.9);border-radius:50%;width:14px;height:14px;display:flex;align-items:center;justify-content:center;line-height:1}
.card.is-new::before{content:'🆕';position:absolute;top:2px;left:2px;font-size:.55rem;z-index:2}
.card.is-tecnico-card{border:2px solid var(--sc);box-shadow:0 0 0 1px var(--sc)}

/* ===== TECNICO PAGE ===== */
.tecnico-page{width:100%;min-height:100%;background:#0a0a0a;color:#fff;padding:16px;overflow-y:auto}
.tecnico-page h2{color:#d97706;font-weight:800;font-size:1.2rem;text-align:center;margin-bottom:16px}
.tecnico-section{margin-bottom:16px}
.tecnico-section h3{font-size:.8rem;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.tecnico-cards-center{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.tecnico-cards{display:flex;flex-wrap:wrap;gap:6px}
.card-dark{background:#1a1a1a!important;border:1.5px solid #d97706!important}
.card-dark .card-name,.card-dark .card-role{color:#fef3c7!important}
.card-dark .card-squad-tag{color:#fbbf24!important}
.card-dark .card-avatar{background:#b45309!important}

/* ===== DECORATIVE PAGE ===== */
.deco-page{width:100%;height:100%;background:#0a2218;display:flex;align-items:center;justify-content:center;background-image:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,.03) 20px,rgba(255,255,255,.03) 21px)}
.deco-ds{font-size:8rem;font-weight:900;color:rgba(255,255,255,.15);user-select:none}

/* ===== DREAM TEAM PAGE ===== */
.dream-page{width:100%;height:100%;background:#0f2d1a;padding:10px;overflow-y:auto}
.dream-header{text-align:center;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:8px}
.dream-header h2{color:#fff;font-size:1rem;font-weight:800}
.dream-rules{color:rgba(255,255,255,.5);font-size:.65rem;margin-top:2px}
.dream-coach-row{display:flex;align-items:center;gap:8px;padding:6px 8px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:8px}
.dream-coach-label{color:#d97706;font-size:.7rem;font-weight:700;white-space:nowrap}
.dream-field{background:#166534;border-radius:4px;padding:8px 4px;position:relative;margin-bottom:8px;overflow:hidden}
.dream-field::before{content:'';position:absolute;top:50%;left:10%;right:10%;height:1px;background:rgba(255,255,255,.2);pointer-events:none}
.dream-field::after{content:'';position:absolute;top:calc(50% - 24px);left:50%;transform:translateX(-50%);width:48px;height:48px;border-radius:50%;border:1px solid rgba(255,255,255,.2);pointer-events:none}
.field-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 0;position:relative}
.row-label{color:rgba(255,255,255,.5);font-size:.55rem;font-weight:700;width:24px;text-align:center;flex-shrink:0}
.dream-slot{width:52px;height:52px;border-radius:50%;border:2px dashed rgba(255,255,255,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:1.1rem;cursor:pointer;transition:.15s;flex-shrink:0;position:relative}
.dream-slot:hover{border-color:rgba(255,255,255,.7);color:rgba(255,255,255,.7);transform:scale(1.05)}
.dream-slot.filled{border:none;color:#fff;font-size:.65rem;font-weight:700}
.slot-name{font-size:.46rem;color:rgba(255,255,255,.85);max-width:54px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;margin-top:1px}
.slot-initials{font-size:.68rem;font-weight:800}
.captain-badge{position:absolute;top:-2px;right:-2px;background:#d97706;color:#fff;border-radius:50%;width:16px;height:16px;font-size:.5rem;display:flex;align-items:center;justify-content:center;z-index:2}
.share-btn{display:block;width:calc(100% - 16px);margin:8px auto 0;padding:10px;background:#00b06f;color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.2s}
.share-btn:hover{background:#00c97e}

/* ===== FAB ===== */
#fab{position:fixed;bottom:24px;right:24px;z-index:50;
  background:linear-gradient(135deg,#0d3d1c 0%,#1a5c30 100%);
  color:#fff;border:2px solid rgba(200,168,60,0.55);border-radius:50px;padding:11px 20px;
  display:flex;align-items:center;gap:10px;font-size:.95rem;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.5),0 0 0 1px rgba(200,168,60,0.15);transition:.2s}
#fab:hover{transform:translateY(-2px);border-color:rgba(200,168,60,0.85);box-shadow:0 6px 28px rgba(0,0,0,0.6)}
#fab:disabled{background:#374151;border-color:rgba(255,255,255,0.1);box-shadow:none;cursor:default;transform:none;opacity:0.5}
.fab-icon{font-size:1.2rem}
.fab-label{line-height:1.2}
.fab-title{font-size:.85rem;font-weight:800;letter-spacing:.03em}
.fab-counter{font-size:.7rem;color:rgba(200,168,60,0.9);font-weight:700}

/* ===== SUA SELEÇÃO PAGE ===== */
.ss-page{width:100%;height:100%;background:linear-gradient(160deg,#071f0f 0%,#0a2e16 100%);display:flex;flex-direction:column;overflow:hidden}
.ss-header{padding:14px 16px 10px;border-bottom:1px solid rgba(200,168,60,0.2);flex-shrink:0}
.ss-header-title{font-size:.8rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;
  background:linear-gradient(90deg,#c8a83c,#f0d060,#c8a83c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ss-header-sub{color:rgba(255,255,255,0.4);font-size:.6rem;letter-spacing:.08em;margin-top:1px}
.ss-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.ss-tab{flex:1;padding:8px 4px;font-size:.72rem;font-weight:700;color:rgba(255,255,255,0.45);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:.2s;letter-spacing:.03em}
.ss-tab.active{color:#c8a83c;border-bottom-color:#c8a83c}
.ss-body{flex:1;overflow-y:auto;padding:8px}
.ss-body::-webkit-scrollbar{width:3px}
.ss-body::-webkit-scrollbar-thumb{background:rgba(200,168,60,0.3);border-radius:2px}
.trade-info{color:rgba(255,255,255,0.5);font-size:.65rem;text-align:center;padding:8px 4px 12px;line-height:1.4}
.trade-cards{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.trade-offer-btn{margin-top:3px;width:100%;padding:3px;font-size:.52rem;font-weight:700;background:rgba(200,168,60,0.15);border:1px solid rgba(200,168,60,0.35);border-radius:4px;color:#c8a83c;cursor:pointer;transition:.15s}
.trade-offer-btn:hover{background:rgba(200,168,60,0.28)}

/* ===== PACK OVERLAY ===== */
#pack-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#pack-overlay h2{color:#fff;font-size:1.5rem;font-weight:800;margin-bottom:24px}
#pack-cards-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.pack-card{width:100px;height:140px;border-radius:10px;overflow:hidden;position:relative;background:#fff;flex-shrink:0;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:popIn .3s ease backwards}
@keyframes popIn{from{transform:scale(.5) translateY(20px);opacity:0}to{transform:scale(1);opacity:1}}
.pack-card .card-strip{height:28px}
.pack-card .card-avatar{width:58px;height:58px;font-size:1.1rem;margin:8px auto 4px}
.badge-nova{position:absolute;top:4px;left:4px;background:#00b06f;color:#fff;font-size:.55rem;padding:2px 5px;border-radius:4px;font-weight:700;z-index:2}
.badge-rep{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;font-size:.6rem;padding:2px 5px;border-radius:4px;font-weight:700;z-index:2}
#pack-save-btn{margin-top:32px;background:#00b06f;color:#fff;padding:14px 32px;border-radius:10px;font-size:1rem;font-weight:700;border:none;cursor:pointer;transition:.2s}
#pack-save-btn:hover{background:#00c97e;transform:translateY(-1px)}

/* ===== PLAYER PICKER ===== */
#player-picker{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:60}
.picker-panel{background:#fff;border-radius:16px;padding:24px;max-width:640px;max-height:80vh;overflow-y:auto;position:relative;width:calc(100% - 32px)}
.picker-panel h3{font-size:1.1rem;font-weight:800;margin-bottom:4px;color:#111}
.picker-sub{font-size:.8rem;color:#6b7280;margin-bottom:16px}
.picker-grid{display:flex;flex-wrap:wrap;gap:8px}
.picker-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:1.4rem;cursor:pointer;color:#374151;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
.picker-close:hover{background:#f3f4f6}
.picker-card{cursor:pointer;transition:.2s}
.picker-card:hover{transform:scale(1.07);box-shadow:0 8px 24px rgba(0,0,0,.25)!important}
.picker-empty{color:#6b7280;font-size:.9rem;line-height:1.6}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:12px 24px;border-radius:30px;font-size:.9rem;z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* ===== SCROLLBAR ===== */
.static-page::-webkit-scrollbar{width:4px}
.static-page::-webkit-scrollbar-thumb{background:rgba(0,0,0,.2);border-radius:2px}
.tecnico-page::-webkit-scrollbar{width:4px}
.tecnico-page::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
.dream-page::-webkit-scrollbar{width:4px}
.dream-page::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

/* ===== MOBILE ===== */
@media(max-width:900px){
  #book-scene{perspective:none}
  #book{width:calc(100vw - 32px);max-width:380px;height:calc(100vh - 110px)}

// ============================================================
// DRAW CARDS (weighted probability)
// ============================================================
function drawCards(n) {
  const weights = TEAM.map(p => {
    let w;
    if (p.id === 1)       w = 1/20;   // Diretora — mais rara
    else if (p.isTecnico) w = 1/15;
    else if (p.isSpecial) w = 1/25;
    else                  w = 1/40;
    return { player: p, w };
  });
  const total = weights.reduce((s,x) => s + x.w, 0);
  const result = [];
  for (let i = 0; i < n; i++) {
    let rand = Math.random() * total;
    let found = false;
    for (const { player, w } of weights) {
      rand -= w;
      if (rand <= 0) { result.push(player); found = true; break; }
    }
    if (!found) result.push(TEAM[Math.floor(Math.random() * TEAM.length)]);
  }
  return result;
}

  if (large)                          classes.push('card-tecnico-lg');

  const styleVar = (player.isTecnico && !dark) ? `--sc:${color};` : '';

  return `<div class="${classes.join(' ')}" style="${styleVar}" title="${player.name}">

      <span class="card-num">#${player.id}</span>
    </div>
    <div class="card-avatar" style="background:${dark?'#b45309':color}">${getInitials(player.name)}</div>

      ${squadName ? `<div class="card-squad-tag" style="color:${dark?'#fbbf24':color}">${squadName}</div>` : ''}
    </div>
  </div>`;
}

  if (page === 'cc-right')return `<div style="width:100%;height:100%;background-image:url('contra-capa.png');background-size:200% 100%;background-position:right center;background-repeat:no-repeat"></div>`;
  if (page === 'gd-left') return `<div style="width:100%;height:100%;background-image:url('gen-dist.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;
  if (page === 'gd-right')return `<div style="width:100%;height:100%;background-image:url('gen-dist.png');background-size:200% 100%;background-position:right center;background-repeat:no-repeat"></div>`;
  if (page === 'dc-left') return `<div style="width:100%;height:100%;background-image:url('dist-cross.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;

  if (page === 'pb-left') return `<div style="width:100%;height:100%;background-image:url('payments-banking.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;
  if (page === 'pb-right')  return `<div style="width:100%;height:100%;background-image:url('payments-banking.png');background-size:200% 100%;background-position:right center;background-repeat:no-repeat"></div>`;
  if (page === 'cred-left') return `<div style="width:100%;height:100%;background-image:url('credito-cartoes.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;
  if (page === 'cred-right')return `<div style="width:100%;height:100%;background-image:url('credito-cartoes.png');background-size:200% 100%;background-position:right center;background-repeat:no-repeat"></div>`;
  if (page === 'nt-left')  return `<div style="width:100%;height:100%;background-image:url('novo-tecnico.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;
  if (page === 'nt-right') return `<div style="width:100%;height:100%;background-image:url('novo-tecnico.png');background-size:200% 100%;background-position:right center;background-repeat:no-repeat"></div>`;
  if (page === 'ms-left')  return `<div style="width:100%;height:100%;background-image:url('monte-selecao.png');background-size:200% 100%;background-position:left center;background-repeat:no-repeat"></div>`;
  if (page === 'ms-right') return renderSuaSelecaoPage();

function renderSquadPage(squadId) {
  const sq = SQUADS[squadId];
  if (!sq) return renderDecoPage();
  const collected = getCollected();
  const manager = TEAM.find(p => p.isTecnico && p.squads.includes(squadId));
  const players = TEAM.filter(p => p.squads.includes(squadId));
  const tecnicos = players.filter(p => p.isTecnico);
  const specials = players.filter(p => !p.isTecnico && p.isSpecial);
  const regulars = players.filter(p => !p.isTecnico && !p.isSpecial);
  const totalInSquad = players.length;
  const collectedInSquad = players.filter(p => collected.includes(p.id)).length;

  let html = `<div class="squad-page">
    <div class="squad-header" style="background:${sq.color}">
      <span class="squad-emoji">${sq.emoji}</span>
      <div>
        <h2>${sq.name}</h2>
        <p>Técnico/a: ${manager ? manager.name : '—'}</p>
      </div>
      <span class="squad-count">${collectedInSquad}/${totalInSquad}</span>
    </div>`;

  if (sq.note) {
    html += `<p class="squad-note">${sq.note}</p>`;
  }

  if (tecnicos.length > 0) {
    html += `<section><h3>🎯 Técnico/a</h3><div class="cards-grid-tecnico">`;
    tecnicos.forEach(p => { html += renderCardHTML(p, {large:true}); });
    html += `</div></section>`;
  }

  if (regulars.length > 0) {
    html += `<section><h3>⚽ Jogadores</h3><div class="cards-grid">`;
    regulars.forEach(p => { html += renderCardHTML(p); });
    html += `</div></section>`;
  }

  if (specials.length > 0) {
    html += `<section><h3>⭐ Cartas Especiais</h3><div class="cards-grid">`;
    specials.forEach(p => { html += renderCardHTML(p); });
    html += `</div></section>`;
  }

  html += `</div>`;
  return html;
}

function renderTecnicoPage() {
  const diretora = TEAM.find(p => p.id === 1);
  const managers = TEAM.filter(p => p.isTecnico && p.id !== 1 && p.role.toLowerCase().includes('manager'));
  const leads = TEAM.filter(p => p.isTecnico && p.id !== 1 && !p.role.toLowerCase().includes('manager'));

  let html = `<div class="tecnico-page"><h2>⭐ Comissão Técnica</h2>`;

  if (diretora) {
    html += `<div class="tecnico-section">
      <h3>👑 Diretora</h3>
      <div class="tecnico-cards-center">${renderCardHTML(diretora, {large:true, dark:true})}</div>
    </div>`;
  }

  if (managers.length > 0) {
    html += `<div class="tecnico-section"><h3>🎖️ Managers</h3><div class="tecnico-cards">`;
    managers.forEach(p => { html += renderCardHTML(p, {dark:true}); });
    html += `</div></div>`;
  }

  if (leads.length > 0) {
    html += `<div class="tecnico-section"><h3>🎖️ Leads</h3><div class="tecnico-cards">`;
    leads.forEach(p => { html += renderCardHTML(p, {dark:true}); });
    html += `</div></div>`;

  html += `</div>`;
  return html;
}

// ============================================================
// DREAM TEAM LOGIC
// ============================================================
function handleSlotClick(row, idx) {
  const dream = getDream();
  const currentId = dream[row][idx];

  if (currentId != null) {
    // toggle captain
    const cap = getCaptain();
    saveCaptain(cap === currentId ? null : currentId);
    refreshCurrentPage();
    return;
  }

  pickerFilter = (row === 'coach') ? 'tecnico' : 'all';
  pickerCallback = function(player) {
    if (row === 'coach' && !player.isTecnico) {
      showToast('Apenas Comissão Técnica pode ser Coach!');
      return false;
    }
    const d = getDream();
    // max 2 per squad
    if (player.squad) {
      const allIds = Object.values(d).flat().filter(x => x != null);
      const sameSquad = allIds.filter(id => {
        const pp = getPlayer(id);
        return pp && pp.squad === player.squad;
      });
      if (sameSquad.length >= 2) {
        showToast('Máximo 2 jogadores do mesmo squad!');
        return false;
      }
    }
    // max 2 specials (não coach)
    if (player.isSpecial && row !== 'coach') {
      const allIds = Object.values(d).flat().filter(x => x != null);
      const specCount = allIds.filter(id => {
        const pp = getPlayer(id);
        return pp && pp.isSpecial;
      }).length;
      if (specCount >= 2) {
        showToast('Máximo 2 cartas especiais!');
        return false;
      }
    }
    d[row][idx] = player.id;
    saveDream(d);
    refreshCurrentPage();
    return true;
  };

  const label = row === 'coach' ? 'Coach' : row.toUpperCase() + ' ' + (idx+1);
  openPicker('Posição: ' + label);
}

function shareLineup() {
  const dream = getDream();
  const captain = getCaptain();
  const n = id => getPlayer(id)?.name || '—';
  const lines = [
    '⚽ Minha Seleção dos Sonhos — Álbum Design Stone 2026\n',
    '🧤 GK: '  + n(dream.gk[0]),
    '🛡️ DEF: ' + dream.def.map(n).join(', '),
    '⚡ MID: '  + dream.mid.map(n).join(', '),
    '🔥 FWD: '  + dream.fwd.map(n).join(', '),
    '🎯 Coach: '+ n(dream.coach[0]),
  ];
  if (captain) lines.push('⭐ Capitão: ' + n(captain));
  navigator.clipboard.writeText(lines.join('\n'))
    .then(()  => showToast('Escalação copiada! 📋'))
    .catch(() => showToast('Erro ao copiar — verifique permissões'));
}

// ============================================================
function openPicker(title) {
  const collected = getCollected();
  const players = pickerFilter === 'tecnico'
    ? TEAM.filter(p => p.isTecnico && collected.includes(p.id))
    : TEAM.filter(p => collected.includes(p.id));

  document.getElementById('picker-title').textContent = 'Escolha: ' + title;
  document.getElementById('picker-sub').textContent = players.length + ' carta(s) disponível(is)';

  const grid = document.getElementById('picker-grid');
  grid.innerHTML = '';

  if (players.length === 0) {
    grid.innerHTML = '<p class="picker-empty">Nenhuma carta disponível.<br>Abra mais pacotes!</p>';
  } else {
    players.forEach(p => {
      const wrap = document.createElement('div');
      wrap.innerHTML = renderCardHTML(p, {noGray:true});
      const card = wrap.firstChild;
      card.classList.add('picker-card');
      card.classList.remove('not-collected');
      card.addEventListener('click', () => {
        const ok = pickerCallback && pickerCallback(p);
        if (ok !== false) closePicker();
      });
      grid.appendChild(card);
    });
  }

  document.getElementById('player-picker').style.display = 'flex';
}

function closePicker() {
  document.getElementById('player-picker').style.display = 'none';
  pickerCallback = null;
}

// ============================================================
function openPack() {
  if (getPacksToday() >= TOTAL_PACKS) {
    showToast('Todos os pacotes de hoje abertos! Volte amanhã 🌅');
    return;
  }
  const drawn = drawCards(5);
  pendingPackCards = drawn;
  showPackOverlay(drawn);
}

function showPackOverlay(cards) {
  const collected = getCollected();
  const row = document.getElementById('pack-cards-row');
  row.innerHTML = '';

  const idsBeforeThis = [];
  cards.forEach((p, i) => {
    const alreadyHad = collected.includes(p.id);
    const dupInDraw = idsBeforeThis.includes(p.id);
    idsBeforeThis.push(p.id);

    const sq = p.squad && SQUADS[p.squad] ? SQUADS[p.squad] : null;
    const color = sq ? sq.color : '#065f46';
    const squadName = sq ? sq.name : (p.squad === 0 ? 'Diretoria' : '');

    const div = document.createElement('div');
    div.className = 'pack-card' + (p.isSpecial ? ' is-special' : '') + (p.isNew ? ' is-new' : '');
    div.style.animationDelay = (i * 0.1) + 's';
    div.innerHTML =
      (!alreadyHad && !dupInDraw ? '<div class="badge-nova">NOVA</div>' : '') +
      (alreadyHad ? '<div class="badge-rep">dup</div>' : '') +
      `<div class="card-strip" style="background:${color}"><span class="card-num">#${p.id}</span></div>
       <div class="card-avatar" style="background:${color};width:58px;height:58px;border-radius:50%;margin:8px auto 4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700">${getInitials(p.name)}</div>
       <div class="card-info" style="text-align:center;padding:0 4px">
         <div class="card-name" style="font-size:.6rem;font-weight:700;line-height:1.2;color:#1a1a1a">${p.name}</div>
         <div class="card-role" style="font-size:.5rem;color:#6b7280;margin-top:1px">${p.role}</div>
         ${squadName ? `<div style="font-size:.48rem;color:${color};font-weight:600;margin-top:2px">${squadName}</div>` : ''}
       </div>`;
    row.appendChild(div);
  });

  document.getElementById('pack-overlay').style.display = 'flex';
}

function savePack() {
  const collected = getCollected();
  let newCount = 0;
  pendingPackCards.forEach(p => {
    if (!collected.includes(p.id)) { collected.push(p.id); newCount++; }
  });
  saveCollected(collected);
  incPacksToday();
  pendingPackCards = [];
  document.getElementById('pack-overlay').style.display = 'none';
  updateFAB();
  refreshCurrentPage();
  showToast(newCount > 0
    ? `+${newCount} figurinha${newCount>1?'s':''} nova${newCount>1?'s':''}! 🎉`
    : 'Pacote guardado (sem novas figurinhas)');
}

// ============================================================
// NAVIGATION
// ============================================================
function updateDots() {
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  SPREADS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentSpread ? ' active' : '');
    d.onclick = () => jumpToSpread(i);
    dots.appendChild(d);
  });
  document.getElementById('nav-prev').disabled = (isMobile ? mobilePageIndex === 0 : currentSpread === 0);
  document.getElementById('nav-next').disabled = (isMobile ? mobilePageIndex === MOBILE_PAGES.length - 1 : currentSpread === SPREADS.length - 1);
}

function jumpToSpread(idx) {
  if (isFlipping) return;
  if (isMobile) {
    mobilePageIndex = idx * 2;
    currentSpread = idx;
    renderMobilePage();
  } else {
    if (idx === currentSpread) return;
    currentSpread = idx;
    document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[currentSpread].left);
    document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[currentSpread].right);
    updateDots();
  }
}

function goForward() {
  if (isFlipping) return;
  if (isMobile) { goMobileForward(); return; }
  if (currentSpread >= SPREADS.length - 1) return;

  isFlipping = true;
  const nextSpread = currentSpread + 1;
  const flipper = document.getElementById('flipper');
  flipper.className = 'flip-forward';
  flipper.style.cssText = 'display:block;left:calc(50% + 4px);right:auto;transform-origin:left center;transform:rotateY(0deg);';

  flipper.querySelector('.front').innerHTML = document.getElementById('p-right').innerHTML;
  flipper.querySelector('.back').innerHTML  = renderPageHTML(SPREADS[nextSpread].left);
  document.getElementById('p-right').style.visibility = 'hidden';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    flipper.style.transform = 'rotateY(-180deg)';
  }));

  flipper.addEventListener('transitionend', function handler() {
    flipper.removeEventListener('transitionend', handler);
    currentSpread = nextSpread;
    document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[currentSpread].left);
    document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[currentSpread].right);
    document.getElementById('p-right').style.visibility = '';
    flipper.style.display = 'none';
    flipper.style.transform = '';
    updateDots();
    isFlipping = false;
  }, { once: true });
}

function goBackward() {
  if (isFlipping) return;
  if (isMobile) { goMobileBackward(); return; }
  if (currentSpread <= 0) return;

  isFlipping = true;
  const prevSpread = currentSpread - 1;
  const flipper = document.getElementById('flipper');
  flipper.className = 'flip-backward';
  flipper.style.cssText = 'display:block;right:0;left:auto;transform-origin:right center;transform:rotateY(0deg);';

  flipper.querySelector('.front').innerHTML = document.getElementById('p-left').innerHTML;
  flipper.querySelector('.back').innerHTML  = renderPageHTML(SPREADS[prevSpread].right);
  document.getElementById('p-left').style.visibility = 'hidden';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    flipper.style.transform = 'rotateY(180deg)';
  }));

  flipper.addEventListener('transitionend', function handler() {
    flipper.removeEventListener('transitionend', handler);
    currentSpread = prevSpread;
    document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[currentSpread].left);
    document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[currentSpread].right);
    document.getElementById('p-left').style.visibility = '';
    flipper.style.display = 'none';
    flipper.style.transform = '';
    updateDots();
    isFlipping = false;
  }, { once: true });
}

// ============================================================
// MOBILE NAVIGATION
// ============================================================
function goMobileForward() {
  if (mobilePageIndex >= MOBILE_PAGES.length - 1) return;
  mobilePageIndex++;
  currentSpread = Math.floor(mobilePageIndex / 2);
  renderMobilePage();
}

function goMobileBackward() {
  if (mobilePageIndex <= 0) return;
  mobilePageIndex--;
  currentSpread = Math.floor(mobilePageIndex / 2);
  renderMobilePage();
}

function renderMobilePage() {
  const page = MOBILE_PAGES[mobilePageIndex];
  document.getElementById('p-right').innerHTML = renderPageHTML(page);
  updateDots();
}

// ============================================================
// REFRESH CURRENT PAGE
// ============================================================
function refreshCurrentPage() {
  if (isMobile) {
    renderMobilePage();
  } else {
    document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[currentSpread].left);
    document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[currentSpread].right);
  }
}

// ============================================================
// FAB
// ============================================================
function updateFAB() {
  const used = getPacksToday();
  document.getElementById('fab-counter').textContent = used + '/' + TOTAL_PACKS;
  document.getElementById('fab').disabled = used >= TOTAL_PACKS;
}

// ============================================================
// LOGIN / LOGOUT
// ============================================================
function populateLoginSelect() {
  const sel = document.getElementById('login-select');
  const sorted = [...TEAM].sort((a,b) => a.name.localeCompare(b.name, 'pt-BR'));
  sorted.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
}

function doLogin() {
  const sel = document.getElementById('login-select');
  if (!sel.value) { showToast('Selecione seu nome!'); return; }
  currentUser = sel.value;
  localStorage.setItem('album_current_user', currentUser);
  showApp();
}

function logout() {
  currentUser = null;
  localStorage.removeItem('album_current_user');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('book-scene').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
  document.getElementById('switch-user-btn').style.display = 'none';
}

function setNavVisible(visible) {
  const d = visible ? '' : 'none';
  document.getElementById('nav-prev').style.display = d;
  document.getElementById('nav-next').style.display = d;
  document.getElementById('dots').style.display    = visible ? 'flex' : 'none';
}

function openAlbum() {
  const cs = document.getElementById('cover-screen');
  cs.style.opacity = '0';
  setTimeout(() => {
    cs.style.display = 'none';
    document.getElementById('book-scene').style.display = 'flex';
    currentSpread = 1;
    document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[1].left);
    document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[1].right);
    setNavVisible(true);
    updateDots();
  }, 400);
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('fab').style.display = 'flex';
  document.getElementById('switch-user-btn').style.display = 'block';

  isMobile = window.innerWidth < 900;
  currentSpread = 0;
  mobilePageIndex = 0;

  if (isMobile) {
    document.getElementById('book-scene').style.display = 'flex';
    setNavVisible(true);
    renderMobilePage();
    updateDots();
  } else {
    setNavVisible(false);
    const cs = document.getElementById('cover-screen');
    cs.style.opacity = '0';
    cs.style.display = 'flex';
    setTimeout(() => { cs.style.opacity = '1'; }, 10);
  }
  updateFAB();
}

// ============================================================
// SWIPE (mobile)
// ============================================================
let touchStartX = 0;
let touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (!isMobile || !currentUser) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) goMobileForward();
    else goMobileBackward();
  }
}, { passive: true });

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  if (!currentUser) return;
  const wasMobile = isMobile;
  isMobile = window.innerWidth < 900;
  if (wasMobile !== isMobile) {
    if (isMobile) {
      mobilePageIndex = currentSpread * 2;
      // reset p-left visibility
      document.getElementById('p-left').classList.remove('mobile-show');
      document.getElementById('p-right').classList.remove('mobile-hide');
      renderMobilePage();
    } else {
      document.getElementById('p-left').innerHTML  = renderPageHTML(SPREADS[currentSpread].left);
      document.getElementById('p-right').innerHTML = renderPageHTML(SPREADS[currentSpread].right);
    }
    updateDots();
  }
});

// ============================================================
// PICKER CLOSE ON BACKDROP
// ============================================================
document.getElementById('player-picker').addEventListener('click', function(e) {
  if (e.target === this) closePicker();
});

// ============================================================
// INIT
// ============================================================
populateLoginSelect();

const savedUser = localStorage.getItem('album_current_user');
if (savedUser) {
  currentUser = savedUser;
  const sel = document.getElementById('login-select');
  sel.value = savedUser;
  showApp();
}
</script>
</body>
</html>
